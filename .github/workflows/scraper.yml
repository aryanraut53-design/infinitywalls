name: Auto Scraper & Deploy
on:
  schedule:
    # Runs every 6 hours automatically
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          # Important: fetch full history so we can push back
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx beautifulsoup4 lxml

      - name: Run Scraper
        env:
          GITHUB_ACTIONS: true
        run: |
          python auto_scraper.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Check if wallpapers.json was modified
          if git diff --quiet wallpaper-web/public/wallpapers.json; then
            echo "No new wallpapers found. Skipping commit."
          else
            git add wallpaper-web/public/wallpapers.json
            git commit -m "chore: auto-update wallpapers [skip ci]"
            git push
          fi
